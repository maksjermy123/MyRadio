<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Радио</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #c8dff0; --sky2:#a8c8e0; --sky3:#7aaac8;
  --green:#4a8e28; --green2:#3a7020; --green3:#d4ead8;
  --orange:#e07820; --orange2:#f09030; --orange3:#fff0d8;
  --trunk:#8b4a1a; --trunk2:#6b3410;
  --cream:#f8f2e4; --cream2:#ede4cc; --cream3:#d8cdb0;
  --bg:#eef6fb; --surface:#ffffff; --surface2:#f5f0e8;
  --text:#2a1a08; --text2:#5a3a18; --muted:#8a6a48;
  --border:rgba(139,74,26,0.12); --border2:rgba(139,74,26,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;overflow-x:hidden; background:var(--bg);}
#loading-screen{position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; background:var(--bg); z-index:200; transition:opacity 0.5s ease;}
#loading-screen.hidden{opacity:0; pointer-events:none;}
.loader-wrap{width:56px;height:56px;position:relative; display:flex; align-items:center; justify-content:center;}
.loader-ring{position:absolute; inset:0; border:2px solid var(--green3); border-top-color:var(--green); border-radius:50%; animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-emoji{font-size:24px;}
.loader-text{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--muted);letter-spacing:0.06em;}
#denied-screen{display:none; position:fixed; inset:0; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:40px 28px; text-align:center; z-index:100; background:linear-gradient(180deg, var(--sky) 0%, var(--cream) 100%);}
#denied-screen.visible{display:flex;}
.denied-img{font-size:52px;margin-bottom:4px;}
.denied-title{font-family:'Cormorant Garamond', serif; font-size:28px;font-weight:600;color:var(--trunk2);}
.denied-line{width:50px;height:2px; background:linear-gradient(90deg, transparent,var(--orange),transparent); margin:2px auto;}
.denied-text{font-size:14px;color:var(--text2);line-height:1.65; max-width:270px;font-weight:400;}
.btn-subscribe{padding:14px 28px;background:var(--green);border:none;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;border-radius:50px;cursor:pointer;text-decoration:none;display:block;width:100%;max-width:256px;text-align:center;transition:background 0.2s, transform 0.15s;box-shadow:0 4px 16px rgba(74,142,40,0.3);}
.btn-subscribe:hover{background:var(--green2);}
.btn-recheck{padding:14px 28px;background:var(--orange);border:none;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;border-radius:50px;cursor:pointer;display:block;width:100%;max-width:256px;transition:opacity 0.2s, transform 0.15s;box-shadow:0 4px 16px rgba(224,120,32,0.3);}
.btn-recheck:disabled{opacity:0.5;cursor:default;}
.section-label{padding:4px 18px 10px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.stations-list{padding:0 12px; display:flex; flex-direction:column; gap:8px;}
.station-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:all 0.2s;position:relative;overflow:hidden;opacity:0; transform:translateY(10px);animation:card-in 0.35s ease forwards;box-shadow:0 2px 8px rgba(139,74,26,0.06);}
.station-card.active{background:var(--orange3);border-color:var(--orange2);box-shadow:0 4px 16px rgba(224,120,32,0.15);}
.station-icon{width:46px;height:46px;background:var(--green3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1.5px solid rgba(74,142,40,0.15);}
.station-info{flex:1;min-width:0;}
.station-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.station-desc{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400;}
.station-track{font-size:13px;color:var(--green2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;font-style:italic;font-family:'Cormorant Garamond',serif; display:none;}
.station-card.active .station-track{display:block;}
.station-play-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;pointer-events:none;}
.station-card.active .station-play-btn{border-color:var(--orange);background:var(--orange);box-shadow:0 2px 10px rgba(224,120,32,0.4);}
.play-tri{width:0;height:0;border-style:solid;border-width:6px 0 6px 10px;border-color:transparent transparent transparent var(--muted);margin-left:3px;transition:border-color 0.2s;}
.station-card.active .play-tri{border-color:transparent transparent transparent #fff;}
@keyframes card-in{to{opacity:1;transform:translateY(0);}}
.bp-topline{height:3px;background:linear-gradient(90deg,var(--green2),var(--orange),var(--green2));}
#bottom-player{position:fixed;bottom:0;left:0;right:0;background:rgba(255,252,248,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:2px solid var(--border2);z-index:50;display:none;}
#bottom-player.visible{display:block;}
.bp-main{display:flex;align-items:center;gap:12px;padding:12px 16px 8px;}
.bp-info{flex:1;min-width:0;}
.bp-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bp-track{font-size:12px;color:var(--green2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;font-family:'Cormorant Garamond',serif;font-style:italic;min-height:15px;}
.bp-status{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:0.06em;}
.bp-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.bp-stop-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.2s;}
.bp-stop-btn:hover{border-color:var(--trunk);color:var(--trunk);}
.bp-play-btn{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--green),var(--orange));cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;flex-shrink:0;box-shadow:0 3px 14px rgba(74,142,40,0.35);}
.bp-play-btn:active{transform:scale(0.92);}
.bp-play-icon{width:0;height:0;border-style:solid;border-width:7px 0 7px 13px;border-color:transparent transparent transparent #fff;margin-left:3px;}
.bp-pause-icon{display:flex;gap:4px;}
.bp-pause-icon span{display:block;width:3px;height:14px;background:#fff;border-radius:2px;}
.share-btn{padding:12px 20px;margin-top:12px;background:var(--green);border-radius:50px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all 0.2s;width:100%;max-width:256px;}
.share-btn:hover{opacity:0.9;transform:scale(1.03);}
.share-icon{font-size:15px;color:#fff;}
.share-label{font-size:13px;font-weight:700;}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-wrap">
    <div class="loader-ring"></div>
    <div class="loader-emoji">🌳</div>
  </div>
  <div class="loader-text">Проверка доступа...</div>
</div>

<div id="denied-screen">
  <div class="denied-img">🌳</div>
  <div class="denied-title">Доступ закрыт</div>
  <div class="denied-line"></div>
  <div class="denied-text">Радио доступно только подписчикам канала «От чтения к преображению».</div>
  <a href="https://t.me/Testovuj" class="btn-subscribe" target="_blank">🌿 Подписаться на канал</a>
  <button class="btn-recheck" id="recheck-btn" onclick="recheckSubscription()">✓ Я подписался — проверить</button>
  <div class="recheck-msg" id="recheck-msg"></div>
</div>

<div id="main-screen">
  <div class="section-label">Выберите станцию</div>
  <div class="stations-list" id="stations-list"></div>

  <button class="share-btn" onclick="shareRadio()">
    <span class="share-icon">↗</span>
    <span class="share-label">Поделиться</span>
  </button>

  <!-- Тестовые кнопки -->
  <div style="margin-top:20px; text-align:center;">
    <button onclick="showMain()" style="padding:8px 16px;margin:5px;">Тест: Основной экран</button>
    <button onclick="showDenied()" style="padding:8px 16px;margin:5px;">Тест: Экран отказа</button>
    <button onclick="document.getElementById('loading-screen').classList.remove('hidden'); document.getElementById('main-screen').classList.remove('visible'); document.getElementById('denied-screen').classList.remove('visible');" style="padding:8px 16px;margin:5px;">Тест: Загрузка</button>
  </div>
</div>

<div id="bottom-player">
  <div class="bp-topline"></div>
  <div class="bp-main">
    <div class="bp-info">
      <div class="bp-name" id="bp-name">—</div>
      <div class="bp-track" id="bp-track"></div>
      <div class="bp-status" id="bp-status">● в эфире</div>
    </div>
    <div class="bp-controls">
      <button class="bp-stop-btn" id="bp-stop-btn">■</button>
      <button class="bp-play-btn" id="bp-play-btn">
        <div class="bp-play-icon" id="bp-play-icon"></div>
      </button>
    </div>
  </div>
</div>

<audio id="audio-player" preload="none"></audio>

<script>
const BACKEND_URL = 'https://myradio-rrsk.onrender.com';
const STATIONS = [
  { id:'dwg',name:'DWG Radio',desc:'Христианское вещание',icon:'✝️',url:'https://server32349.streamplus.de/;stream.mp3/;type=mp3' },
  { id:'golos1',name:'Голос Мира — Проповеди',desc:'МСЦ ЕХБ · Слово и поучение',icon:'🕊️',url:'https://golosmira.com:8021/rgm.mp3' },
  { id:'golos2',name:'Голос Мира — Музыка',desc:'Христианские песнопения',icon:'🎵',url:'https://golosmira.com:8021/music64.mp3' },
  { id:'golos3',name:'Голос Мира — Библия',desc:'Чтение Священного Писания',icon:'📖',url:'https://golosmira.com:9022/Bible' },
  { id:'slovo',name:'Слово Благодати',desc:'Проповеди и богослужения',icon:'🙏',url:'https://c13.radioboss.fm:18516/stream' }
];

const tg = window.Telegram?.WebApp;
const audio = document.getElementById('audio-player');
let currentStation=null,isPlaying=false,metaInterval=null;

function renderStations(){
  const list=document.getElementById('stations-list');list.innerHTML='';
  STATIONS.forEach(s=>{
    const card=document.createElement('div');card.className='station-card';card.dataset.id=s.id;
    card.innerHTML=`<div class="station-icon">${s.icon}</div><div class="station-info"><div class="station-name">${s.name}</div><div class="station-desc">${s.desc}</div><div class="station-track" id="track-${s.id}"></div></div><div class="station-play-btn"><div class="play-tri"></div></div>`;
    card.addEventListener('click',()=>handleClick(s,card));list.appendChild(card);
  });
}
function handleClick(station,card){if(currentStation?.id===station.id){togglePlay();return;}
  document.querySelectorAll('.station-card').forEach(c=>c.classList.remove('active','loading'));
  card.classList.add('loading');playStation(station,card);
}
function playStation(station,card){audio.pause();stopMetaPolling();audio.src=station.url;currentStation=station;
  document.getElementById('bp-name').textContent=station.name;document.getElementById('bp-track').textContent='';
  document.getElementById('bottom-player').classList.add('visible');audio.load();
  audio.play().then(()=>{isPlaying=true;card.classList.remove('loading');card.classList.add('active');updatePlayBtn(true);startMetaPolling(station);}).catch(()=>card.classList.remove('loading'));
}
function togglePlay(){if(!currentStation)return;if(isPlaying){audio.pause();isPlaying=false;updatePlayBtn(false);stopMetaPolling();}
else{audio.play();isPlaying=true;updatePlayBtn(true);startMetaPolling(currentStation);}}
function stopAll(){audio.pause();audio.src='';isPlaying=false;currentStation=null;stopMetaPolling();document.querySelectorAll('.station-card').forEach(c=>c.classList.remove('active','loading'));document.querySelectorAll('.station-track').forEach(t=>t.textContent='');document.getElementById('bottom-player').classList.remove('visible');}
function updatePlayBtn(playing){const icon=document.getElementById('bp-play-icon');if(playing){icon.outerHTML='<div class="bp-pause-icon" id="bp-play-icon"><span></span><span></span></div>';}else{document.getElementById('bp-play-icon').outerHTML='<div class="bp-play-icon" id="bp-play-icon"></div>';}}
function startMetaPolling(station){fetchMeta(station);metaInterval=setInterval(()=>fetchMeta(station),15000);}
function stopMetaPolling(){if(metaInterval){clearInterval(metaInterval);metaInterval=null;}}
async function fetchMeta(station){try{const res=await fetch(`${BACKEND_URL}/metadata?url=${encodeURIComponent(station.url)}`,{signal:AbortSignal.timeout(6000)});const data=await res.json();if(data.available&&data.title){const el=document.getElementById('track-'+station.id);if(el)el.textContent='♪ '+data.title;document.getElementById('bp-track').textContent='♪ '+data.title;}}catch{}}

audio.addEventListener('
