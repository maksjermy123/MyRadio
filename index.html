<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Христианское Радио</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<!-- Загрузка -->
<div id="loading-screen">
  <div>🌳 Проверка доступа...</div>
</div>

<!-- Отказ -->
<div id="denied-screen">
  <div>🌳 Доступ закрыт</div>
  <div>Подписка на канал обязательна</div>
  <a id="subscribe-btn" href="https://t.me/ВашКанал" target="_blank">Подписаться</a>
  <button onclick="recheckSubscription()">Я подписался — проверить</button>
  <div id="recheck-msg"></div>
</div>

<!-- Основной экран -->
<div id="main-screen">
  <header>
    <h1>Христианское радио</h1>
    <h2>для канала «От чтения к преображению»</h2>
  </header>

  <section id="stations-list"></section>

  <button class="share-btn" onclick="shareRadio()">↗ Поделиться</button>
</div>

<script>
const TG = window.Telegram.WebApp;
TG.expand();

let user_id = TG.initDataUnsafe.user?.id;

function showLoading(show=true){
  document.getElementById("loading-screen").style.display = show ? "flex" : "none";
}
function showDenied(show=true){
  document.getElementById("denied-screen").style.display = show ? "flex" : "none";
}
function showMain(show=true){
  document.getElementById("main-screen").style.display = show ? "block" : "none";
}

async function checkSubscription() {
  showLoading(true);
  try {
    const res = await fetch("/check_subscription", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({user_id})
    });
    const data = await res.json();
    if(data.subscribed){
      showMain(true);
      showDenied(false);
      renderStations(data.stations);
    } else {
      showDenied(true);
      showMain(false);
    }
  } catch(e){
    console.error(e);
    alert("Ошибка проверки подписки");
  } finally {
    showLoading(false);
  }
}

function recheckSubscription(){
  document.getElementById("recheck-msg").innerText = "Проверка...";
  checkSubscription();
}

function renderStations(stations){
  const list = document.getElementById("stations-list");
  list.innerHTML = "";
  stations.forEach(st=>{
    const div = document.createElement("div");
    div.className = "station-card";
    div.innerHTML = `<b>${st.name}</b><p>${st.desc}</p>`;
    div.onclick = ()=>playStation(st);
    list.appendChild(div);
  });
}

let audio;
function playStation(station){
  if(audio) audio.pause();
  audio = new Audio(station.url);
  audio.play();
}

function shareRadio(){
  TG.shareData({url: "https://ВашСайтСРадио.ru"});
}

checkSubscription();
</script>
</body>
</html>
