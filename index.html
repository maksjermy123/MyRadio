<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Радио</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:       #c8dff0;
  --sky2:      #a8c8e0;
  --sky3:      #7aaac8;
  --green:     #4a8e28;
  --green2:    #3a7020;
  --green3:    #d4ead8;
  --orange:    #e07820;
  --orange2:   #f09030;
  --orange3:   #fff0d8;
  --trunk:     #8b4a1a;
  --trunk2:    #6b3410;
  --bg:        #eef6fb;
  --surface:   #ffffff;
  --text:      #2a1a08;
  --text2:     #5a3a18;
  --muted:     #8a6a48;
  --border:    rgba(139,74,26,0.12);
  --border2:   rgba(139,74,26,0.22);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; overflow-x: hidden; }

/* ЗАГРУЗКА */
#loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 200; transition: opacity 0.5s; }
#loading-screen.hidden { opacity: 0; pointer-events: none; }
.loader-ring { width: 56px; height: 56px; border: 2px solid var(--green3); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ОТКАЗ */
#denied-screen { display: none; position: fixed; inset: 0; background: linear-gradient(180deg, var(--sky) 0%, #f8f2e4 100%); flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px 28px; text-align: center; z-index: 100; }
#denied-screen.visible { display: flex; }
.btn-subscribe { padding: 14px 28px; background: var(--green); border: none; color: #fff; border-radius: 50px; font-weight: 700; text-decoration: none; width: 100%; max-width: 256px; box-shadow: 0 4px 16px rgba(74,142,40,0.3); }
.btn-recheck { padding: 14px 28px; background: var(--orange); border: none; color: #fff; border-radius: 50px; font-weight: 700; width: 100%; max-width: 256px; margin-top: 10px; }

/* ШАПКА */
#main-screen { display: none; padding-bottom: 160px; }
#main-screen.visible { display: block; }
.header { background: linear-gradient(180deg, var(--sky) 0%, var(--sky2) 60%, var(--bg) 100%); padding: 24px 20px; position: relative; }
.header::before { content: '☁️'; position: absolute; top: 10px; left: 10%; opacity: 0.4; font-size: 40px; }
.header-inner { display: flex; align-items: flex-start; gap: 12px; position: relative; z-index: 1; }
.header-tree { font-size: 52px; filter: drop-shadow(0 2px 8px rgba(74,142,40,0.3)); }
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: var(--trunk2); font-weight: 600; }
.header-channel { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--trunk); font-size: 20px; }

/* СПИСОК СТАНЦИЙ */
.section-label { padding: 10px 18px; font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.2em; }
.stations-list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
.station-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 13px; cursor: pointer; transition: 0.2s; }
.station-card.active { background: var(--orange3); border-color: var(--orange2); }
.station-icon { width: 46px; height: 46px; background: var(--green3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.station-name { font-size: 16px; font-weight: 700; }
.station-desc { font-size: 13px; color: var(--muted); }
.station-track { font-size: 13px; color: var(--green2); font-style: italic; display: none; margin-top: 4px; }
.station-card.active .station-track { display: block; }

/* ПЛЕЕР */
#bottom-player { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,252,248,0.98); backdrop-filter: blur(15px); border-top: 2px solid var(--border2); display: none; z-index: 50; }
#bottom-player.visible { display: block; }
.bp-main { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
.bp-bar { width: 3px; border-radius: 2px; background: var(--green); animation: bar-dance 1s infinite alternate; }
.bp-bar.paused { animation-play-state: paused; height: 4px !important; }
@keyframes bar-dance { from { height: 4px; } to { height: 20px; } }
.bp-info { flex: 1; overflow: hidden; }
.bp-name { font-weight: 700; font-size: 14px; }
.bp-track { font-size: 12px; color: var(--green2); font-style: italic; }
.bp-play-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--green), var(--orange)); color: white; display: flex; align-items: center; justify-content: center; }

/* ГРОМКОСТЬ */
.volume-row { display: flex; align-items: center; gap: 10px; padding: 0 16px 12px; }
.volume-slider { flex: 1; accent-color: var(--green); }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text" style="font-family: 'Cormorant Garamond'; italic">Проверка доступа...</div>
</div>

<div id="denied-screen">
  <div style="font-size: 52px">🌳</div>
  <div class="denied-title">Доступ закрыт</div>
  <p class="denied-text">Радио доступно только подписчикам канала «От чтения к преображению».</p>
  <a href="https://t.me/Testovuj" class="btn-subscribe">🌿 Подписаться на канал</a>
  <button class="btn-recheck" id="recheck-btn" onclick="recheckSubscription()">✓ Я подписался — проверить</button>
</div>

<div id="main-screen">
  <div class="header">
    <div class="header-inner">
      <div class="header-tree">🌳</div>
      <div class="header-texts">
        <div class="header-title">Христианское радио</div>
        <div class="header-channel">для канала «От чтения к преображению»</div>
      </div>
    </div>
  </div>

  <div class="section-label">Выберите станцию</div>
  <div class="stations-list" id="stations-list"></div>

  <div style="padding: 20px 12px;">
    <div class="station-card" onclick="shareRadio()" style="background: linear-gradient(135deg, #f0faf0, #fff8f0)">
       <div class="station-icon">↗</div>
       <div class="station-info">
         <div class="station-name">Поделиться радио</div>
         <div class="station-desc">Отправить ссылку другу в Telegram</div>
       </div>
    </div>
  </div>
</div>

<div id="bottom-player">
  <div class="bp-main">
    <div class="bp-vis" style="display:flex; gap:3px; height:20px; align-items:flex-end">
      <div class="bp-bar" style="height:12px; animation-delay:0s"></div>
      <div class="bp-bar" style="height:18px; animation-delay:0.2s"></div>
      <div class="bp-bar" style="height:10px; animation-delay:0.4s"></div>
    </div>
    <div class="bp-info">
      <div class="bp-name" id="bp-name">Станция</div>
      <div class="bp-track" id="bp-track">Загрузка...</div>
    </div>
    <button class="bp-play-btn" onclick="togglePlay()" id="play-btn-main">▶</button>
  </div>
  <div class="volume-row" id="vol-row">
    <span style="font-size:12px">🔈</span>
    <input type="range" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    <span style="font-size:12px">🔊</span>
  </div>
</div>

<audio id="audio-player"></audio>

<script>
const BACKEND_URL = 'https://myradio-rrsk.onrender.com';
const STATIONS = [
  { id: 'dwg',    name: 'DWG Radio',              desc: 'Христианское вещание',        icon: '✝️',  url: 'https://server32349.streamplus.de/;stream.mp3' },
  { id: 'golos1', name: 'Голос Мира — Проповеди', desc: 'МСЦ ЕХБ · Слово и поучение', icon: '🕊️', url: 'https://golosmira.com:8021/rgm.mp3' },
  { id: 'golos2', name: 'Голос Мира — Музыка',    desc: 'Христианские песнопения',     icon: '🎵',  url: 'https://golosmira.com:8021/music64.mp3' },
  { id: 'golos3', name: 'Голос Мира — Библия',    desc: 'Чтение Священного Писания',   icon: '📖',  url: 'https://golosmira.com:9022/Bible' },
  { id: 'slovo',  name: 'Слово Благодати',        desc: 'Проповеди и богослужения',    icon: '🙏',  url: 'https://c13.radioboss.fm:18516/stream' }
];

const tg = window.Telegram.WebApp;
const audio = document.getElementById('audio-player');
let currentStation = null;
let metaInterval = null;

function renderStations() {
  const list = document.getElementById('stations-list');
  STATIONS.forEach(s => {
    const card = document.createElement('div');
    card.className = 'station-card';
    card.id = 'card-' + s.id;
    card.innerHTML = `
      <div class="station-icon">${s.icon}</div>
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-desc">${s.desc}</div>
        <div class="station-track" id="track-${s.id}"></div>
      </div>
    `;
    card.onclick = () => playStation(s);
    list.appendChild(card);
  });
}

function playStation(s) {
  if (currentStation?.id === s.id) return togglePlay();
  
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + s.id).classList.add('active');
  
  currentStation = s;
  audio.src = s.url;
  audio.play();
  
  document.getElementById('bp-name').innerText = s.name;
  document.getElementById('bottom-player').classList.add('visible');
  document.getElementById('play-btn-main').innerText = '⏸';
  
  startMeta(s);
}

function togglePlay() {
  if (audio.paused) { audio.play(); document.getElementById('play-btn-main').innerText = '⏸'; setBars(true); }
  else { audio.pause(); document.getElementById('play-btn-main').innerText = '▶'; setBars(false); }
}

function setBars(play) {
  document.querySelectorAll('.bp-bar').forEach(b => play ? b.classList.remove('paused') : b.classList.add('paused'));
}

function setVolume(v) { audio.volume = v / 100; }

async function startMeta(s) {
  if (metaInterval) clearInterval(metaInterval);
  const update = async () => {
    try {
      const r = await fetch(`${BACKEND_URL}/metadata?url=${encodeURIComponent(s.url)}`);
      const d = await r.json();
      const txt = d.title || 'Прямой эфир';
      document.getElementById('bp-track').innerText = txt;
      document.getElementById('track-' + s.id).innerText = '♪ ' + txt;
    } catch(e) {}
  };
  update();
  metaInterval = setInterval(update, 30000);
}

async function checkAccess() {
  try {
    const r = await fetch(`${BACKEND_URL}/verify`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ init_data: tg.initData })
    });
    const d = await r.json();
    if (d.allowed) {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.add('visible');
      tg.expand();
    } else {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('denied-screen').classList.add('visible');
    }
  } catch(e) { 
    // Если сервер лежит, временно пускаем (или выводим ошибку)
    document.getElementById('loading-screen').innerText = "Ошибка связи с сервером";
  }
}

function recheckSubscription() { location.reload(); }

function shareRadio() {
  const text = '🌳 Христианское радио в Telegram!';
  const url = 'https://t.me/preoradio_bot/radio';
  tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
}

window.onload = () => { renderStations(); checkAccess(); };
</script>
</body>
</html>
