<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Радио</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --surface: #10141d;
  --surface2: #181d28;
  --surface3: #1f2535;
  --accent: #c9a96e;
  --accent2: #e8c99a;
  --accent3: #f5e4c0;
  --text: #ede9df;
  --text2: #b8b3a8;
  --muted: #5a6070;
  --border: rgba(201,169,110,0.12);
  --border2: rgba(201,169,110,0.22);
  --glow: rgba(201,169,110,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Фон */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 100% 60% at 50% -5%, rgba(201,169,110,0.06) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(100,130,180,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Сетка */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,169,110,0.015) 40px, rgba(201,169,110,0.015) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,169,110,0.015) 40px, rgba(201,169,110,0.015) 41px);
  pointer-events: none;
  z-index: 0;
}

#app { position: relative; z-index: 1; }

/* ── ЭКРАН ЗАГРУЗКИ ── */
#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  z-index: 200;
  transition: opacity 0.6s ease;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }

.loader-ring {
  width: 48px;
  height: 48px;
  border: 1.5px solid rgba(201,169,110,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin-ring 1s linear infinite;
}
@keyframes spin-ring { to { transform: rotate(360deg); } }

.loader-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  letter-spacing: 0.12em;
}

/* ── ЭКРАН ОТКАЗА ── */
#denied-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px 32px;
  text-align: center;
  z-index: 100;
}
#denied-screen.visible { display: flex; }

.denied-ornament {
  font-size: 32px;
  color: var(--accent);
  opacity: 0.6;
  margin-bottom: 4px;
  line-height: 1;
}
.denied-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
}
.denied-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  max-width: 270px;
  font-weight: 300;
}
.denied-divider {
  width: 40px;
  height: 1px;
  background: var(--border2);
  margin: 2px auto;
}
.btn-subscribe {
  padding: 13px 30px;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 1px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: background 0.25s, color 0.25s;
  width: 100%;
  max-width: 260px;
  text-align: center;
}
.btn-subscribe:hover { background: rgba(201,169,110,0.1); }

.btn-recheck {
  padding: 13px 30px;
  background: var(--accent);
  border: 1px solid var(--accent);
  color: var(--bg);
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-radius: 1px;
  cursor: pointer;
  width: 100%;
  max-width: 260px;
  transition: opacity 0.2s;
}
.btn-recheck:disabled { opacity: 0.5; cursor: default; }
.btn-recheck:hover:not(:disabled) { opacity: 0.88; }

.recheck-msg {
  font-size: 11px;
  color: var(--muted);
  min-height: 16px;
  letter-spacing: 0.04em;
}

/* ── ОСНОВНОЙ ЭКРАН ── */
#main-screen { display: none; padding-bottom: 160px; }
#main-screen.visible { display: block; }

/* Шапка */
.header {
  padding: 28px 24px 22px;
  position: relative;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.header-label {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 5px;
  font-weight: 400;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 400;
  font-style: italic;
  color: var(--text);
  line-height: 1.15;
}
.header-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.4;
}
.header-ornament {
  font-size: 22px;
  color: var(--accent);
  opacity: 0.35;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Секция */
.section-label {
  padding: 20px 24px 8px;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 400;
}

/* Карточки */
.stations-list {
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.station-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(8px);
  animation: card-in 0.35s ease forwards;
}
.station-card:nth-child(1) { animation-delay: 0.04s; }
.station-card:nth-child(2) { animation-delay: 0.09s; }
.station-card:nth-child(3) { animation-delay: 0.14s; }
.station-card:nth-child(4) { animation-delay: 0.19s; }
.station-card:nth-child(5) { animation-delay: 0.24s; }
@keyframes card-in { to { opacity: 1; transform: translateY(0); } }

.station-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--accent2), var(--accent));
  transform: scaleY(0);
  transition: transform 0.25s;
  transform-origin: center;
}
.station-card:active { transform: scale(0.985); }
.station-card.active {
  background: var(--surface2);
  border-color: rgba(201,169,110,0.25);
}
.station-card.active::before { transform: scaleY(1); }

.station-icon {
  width: 42px;
  height: 42px;
  background: var(--surface2);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  border: 1px solid var(--border);
  transition: background 0.2s;
}
.station-card.active .station-icon {
  background: var(--surface3);
  border-color: rgba(201,169,110,0.2);
}

.station-info { flex: 1; min-width: 0; }
.station-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.01em;
}
.station-desc {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.02em;
}
.station-track {
  font-size: 10px;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 3px;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  display: none;
}
.station-card.active .station-track { display: block; }

.station-play-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.2s, background 0.2s;
  pointer-events: none;
}
.station-card.active .station-play-btn {
  border-color: var(--accent);
  background: var(--accent);
}
.play-tri {
  width: 0; height: 0;
  border-style: solid;
  border-width: 5px 0 5px 9px;
  border-color: transparent transparent transparent var(--muted);
  margin-left: 2px;
  transition: border-color 0.2s;
}
.station-card.active .play-tri {
  border-color: transparent transparent transparent var(--bg);
}
.station-card.loading .station-play-btn { border-color: rgba(201,169,110,0.4); }
.station-card.loading .play-tri {
  border: none;
  width: 12px; height: 12px;
  border-top: 1.5px solid var(--accent);
  border-right: 1.5px solid transparent;
  border-radius: 50%;
  margin-left: 0;
  animation: spin-ring 0.7s linear infinite;
}

/* ── НИЖНИЙ ПЛЕЕР ── */
#bottom-player {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(8,10,15,0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  z-index: 50;
  display: none;
}
#bottom-player.visible { display: block; }

.bp-main {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px 10px;
}

.bp-vis {
  display: flex;
  align-items: flex-end;
  gap: 2.5px;
  height: 22px;
  flex-shrink: 0;
}
.bp-bar {
  width: 2.5px;
  background: var(--accent);
  border-radius: 1.5px;
  animation: bar-dance 0.9s ease-in-out infinite;
}
.bp-bar:nth-child(1) { height: 35%; animation-delay: 0s; }
.bp-bar:nth-child(2) { height: 90%; animation-delay: 0.18s; }
.bp-bar:nth-child(3) { height: 55%; animation-delay: 0.35s; }
.bp-bar:nth-child(4) { height: 75%; animation-delay: 0.12s; }
.bp-bar:nth-child(5) { height: 40%; animation-delay: 0.28s; }
@keyframes bar-dance {
  0%,100% { transform: scaleY(0.35); opacity: 0.5; }
  50% { transform: scaleY(1); opacity: 1; }
}
.bp-bar.paused { animation-play-state: paused; transform: scaleY(0.35); opacity: 0.4; }

.bp-info { flex: 1; min-width: 0; }
.bp-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.02em;
}
.bp-track {
  font-size: 11px;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  min-height: 14px;
}
.bp-status {
  font-size: 9px;
  color: var(--muted);
  margin-top: 1px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.bp-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.bp-stop-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  transition: border-color 0.2s, color 0.2s;
}
.bp-stop-btn:hover { border-color: var(--accent); color: var(--accent); }

.bp-play-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, opacity 0.2s;
  flex-shrink: 0;
}
.bp-play-btn:active { transform: scale(0.92); }
.bp-play-icon {
  width: 0; height: 0;
  border-style: solid;
  border-width: 7px 0 7px 12px;
  border-color: transparent transparent transparent var(--bg);
  margin-left: 3px;
}
.bp-pause-icon { display: flex; gap: 3px; }
.bp-pause-icon span {
  display: block;
  width: 3px; height: 13px;
  background: var(--bg);
  border-radius: 1.5px;
}

/* ── ГРОМКОСТЬ ── */
.volume-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 18px 14px;
}
.vol-icon {
  font-size: 13px;
  color: var(--muted);
  flex-shrink: 0;
  width: 16px;
  text-align: center;
  cursor: pointer;
  user-select: none;
}
.vol-icon:hover { color: var(--accent); }

input[type=range].volume-slider {
  flex: 1;
  height: 2px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--surface3);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range].volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: transform 0.15s;
}
input[type=range].volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
input[type=range].volume-slider::-moz-range-thumb {
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
}
.vol-pct {
  font-size: 10px;
  color: var(--muted);
  min-width: 28px;
  text-align: right;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<!-- Загрузка -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">Проверка доступа</div>
</div>

<!-- Отказ -->
<div id="denied-screen">
  <div class="denied-ornament">✦</div>
  <div class="denied-title">Доступ закрыт</div>
  <div class="denied-divider"></div>
  <div class="denied-text">Радио доступно только подписчикам канала «От чтения к преображению».</div>
  <a href="https://t.me/Testovuj" class="btn-subscribe" target="_blank">Подписаться на канал</a>
  <button class="btn-recheck" id="recheck-btn" onclick="recheckSubscription()">✓ Я подписался — проверить</button>
  <div class="recheck-msg" id="recheck-msg"></div>
</div>

<!-- Основной экран -->
<div id="app">
  <div id="main-screen">

    <div class="header">
      <div class="header-top">
        <div>
          <div class="header-label">Прямой эфир · Онлайн</div>
          <div class="header-title">Христианское радио</div>
          <div class="header-subtitle">канал «От чтения к преображению»</div>
        </div>
        <div class="header-ornament">♱</div>
      </div>
    </div>

    <div class="section-label">Выберите станцию</div>
    <div class="stations-list" id="stations-list"></div>

  </div>
</div>

<!-- Нижний плеер -->
<div id="bottom-player">
  <div class="bp-main">
    <div class="bp-vis">
      <div class="bp-bar" id="b1"></div>
      <div class="bp-bar" id="b2"></div>
      <div class="bp-bar" id="b3"></div>
      <div class="bp-bar" id="b4"></div>
      <div class="bp-bar" id="b5"></div>
    </div>
    <div class="bp-info">
      <div class="bp-name" id="bp-name">—</div>
      <div class="bp-track" id="bp-track"></div>
      <div class="bp-status" id="bp-status">● в эфире</div>
    </div>
    <div class="bp-controls">
      <button class="bp-stop-btn" id="bp-stop-btn" title="Стоп">■</button>
      <button class="bp-play-btn" id="bp-play-btn">
        <div class="bp-play-icon" id="bp-play-icon"></div>
      </button>
    </div>
  </div>
  <div class="volume-row">
    <span class="vol-icon" id="vol-icon" onclick="toggleMute()">🔊</span>
    <input type="range" class="volume-slider" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
    <span class="vol-pct" id="vol-pct">80%</span>
  </div>
</div>

<audio id="audio-player" preload="none"></audio>

<script>
// ── КОНФИГ ──────────────────────────────────────────────────
const BACKEND_URL = 'https://myradio-rrsk.onrender.com';
const CHANNEL_USERNAME = '@Testovuj';

const STATIONS = [
  {
    id: 'dwg',
    name: 'DWG Radio',
    desc: 'Христианское вещание · Немецкое общество',
    icon: '✝️',
    url: 'https://server32349.streamplus.de/;stream.mp3/;type=mp3'
  },
  {
    id: 'golos1',
    name: 'Голос Мира — Проповеди',
    desc: 'МСЦ ЕХБ · Слово и поучение',
    icon: '🕊️',
    url: 'https://golosmira.com:8021/rgm.mp3'
  },
  {
    id: 'golos2',
    name: 'Голос Мира — Музыка',
    desc: 'Христианские песнопения',
    icon: '🎵',
    url: 'https://golosmira.com:8021/music64.mp3'
  },
  {
    id: 'golos3',
    name: 'Голос Мира — Библия',
    desc: 'Чтение Священного Писания',
    icon: '📖',
    url: 'https://golosmira.com:9022/Bible'
  },
  {
    id: 'slovo',
    name: 'Слово Благодати',
    desc: 'Проповеди и богослужения',
    icon: '🙏',
    url: 'https://c13.radioboss.fm:18516/stream'
  }
];
// ────────────────────────────────────────────────────────────

const tg = window.Telegram?.WebApp;
const audio = document.getElementById('audio-player');
let currentStation = null;
let isPlaying = false;
let isMuted = false;
let prevVolume = 80;
let metaInterval = null;

if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#080a0f');
  tg.setBackgroundColor('#080a0f');
}

// ── РЕНДЕР КАРТОЧЕК ─────────────────────────────────────────
function renderStations() {
  const list = document.getElementById('stations-list');
  list.innerHTML = '';
  STATIONS.forEach(s => {
    const card = document.createElement('div');
    card.className = 'station-card';
    card.dataset.id = s.id;
    card.innerHTML = `
      <div class="station-icon">${s.icon}</div>
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-desc">${s.desc}</div>
        <div class="station-track" id="track-${s.id}"></div>
      </div>
      <div class="station-play-btn">
        <div class="play-tri"></div>
      </div>`;
    card.addEventListener('click', () => handleClick(s, card));
    list.appendChild(card);
  });
}

function handleClick(station, card) {
  if (currentStation?.id === station.id) { togglePlay(); return; }
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active','loading'));
  card.classList.add('loading');
  playStation(station, card);
}

function playStation(station, card) {
  audio.pause();
  stopMetaPolling();
  audio.src = station.url;
  audio.volume = document.getElementById('vol-slider').value / 100;
  currentStation = station;

  document.getElementById('bp-name').textContent = station.name;
  document.getElementById('bp-track').textContent = '';
  document.getElementById('bottom-player').classList.add('visible');

  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    card.classList.remove('loading');
    card.classList.add('active');
    updatePlayBtn(true);
    startMetaPolling(station);
  }).catch(() => {
    card.classList.remove('loading');
  });
}

function togglePlay() {
  if (!currentStation) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    updatePlayBtn(false);
    setBars(false);
    stopMetaPolling();
  } else {
    audio.play();
    isPlaying = true;
    updatePlayBtn(true);
    setBars(true);
    startMetaPolling(currentStation);
  }
}

function stopAll() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  currentStation = null;
  stopMetaPolling();
  document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active','loading'));
  document.querySelectorAll('.station-track').forEach(t => t.textContent = '');
  document.getElementById('bottom-player').classList.remove('visible');
  setBars(false);
}

function updatePlayBtn(playing) {
  const icon = document.getElementById('bp-play-icon');
  if (playing) {
    icon.outerHTML = '<div class="bp-pause-icon" id="bp-play-icon"><span></span><span></span></div>';
    setBars(true);
  } else {
    const el = document.getElementById('bp-play-icon');
    el.outerHTML = '<div class="bp-play-icon" id="bp-play-icon"></div>';
    setBars(false);
  }
}

function setBars(on) {
  for (let i = 1; i <= 5; i++) {
    const b = document.getElementById('b' + i);
    if (b) on ? b.classList.remove('paused') : b.classList.add('paused');
  }
}

// ── ГРОМКОСТЬ ────────────────────────────────────────────────
function setVolume(val) {
  const v = parseInt(val);
  audio.volume = v / 100;
  audio.muted = false;
  isMuted = false;
  document.getElementById('vol-pct').textContent = v + '%';
  document.getElementById('vol-icon').textContent = v === 0 ? '🔇' : v < 40 ? '🔉' : '🔊';
}

function toggleMute() {
  if (isMuted) {
    isMuted = false;
    audio.muted = false;
    document.getElementById('vol-slider').value = prevVolume;
    setVolume(prevVolume);
  } else {
    isMuted = true;
    prevVolume = document.getElementById('vol-slider').value;
    audio.muted = true;
    document.getElementById('vol-pct').textContent = '0%';
    document.getElementById('vol-icon').textContent = '🔇';
  }
}

// ── МЕТАДАННЫЕ ТРЕКОВ ────────────────────────────────────────
async function fetchMeta(station) {
  try {
    const res = await fetch(
      `${BACKEND_URL}/metadata?url=${encodeURIComponent(station.url)}`,
      { signal: AbortSignal.timeout(6000) }
    );
    const data = await res.json();
    if (data.available && data.title) {
      const trackEl = document.getElementById('track-' + station.id);
      if (trackEl) trackEl.textContent = '♪ ' + data.title;
      document.getElementById('bp-track').textContent = '♪ ' + data.title;
    }
  } catch {}
}

function startMetaPolling(station) {
  fetchMeta(station);
  metaInterval = setInterval(() => fetchMeta(station), 15000);
}

function stopMetaPolling() {
  if (metaInterval) { clearInterval(metaInterval); metaInterval = null; }
}

// ── АУДИО СОБЫТИЯ ───────────────────────────────────────────
audio.addEventListener('playing', () => {
  isPlaying = true;
  setBars(true);
  document.getElementById('bp-status').textContent = '● в эфире';
});
audio.addEventListener('waiting', () => {
  document.getElementById('bp-status').textContent = '○ загрузка...';
});
audio.addEventListener('error', () => {
  document.getElementById('bp-status').textContent = '✕ ошибка потока';
});
audio.addEventListener('pause', () => {
  document.getElementById('bp-status').textContent = '⏸ пауза';
});

document.getElementById('bp-stop-btn').addEventListener('click', stopAll);
document.getElementById('bp-play-btn').addEventListener('click', togglePlay);

// ── ПРОВЕРКА ПОДПИСКИ ────────────────────────────────────────
async function checkSubscription() {
  if (!tg || !tg.initData) { showMain(); return; }
  try {
    const res = await fetch(`${BACKEND_URL}/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: tg.initData })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    data.allowed ? showMain() : showDenied();
  } catch {
    showDenied();
  }
}

async function recheckSubscription() {
  const btn = document.getElementById('recheck-btn');
  const msg = document.getElementById('recheck-msg');
  btn.disabled = true;
  btn.textContent = '⏳ Проверяю...';
  msg.textContent = '';
  try {
    const res = await fetch(`${BACKEND_URL}/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: tg ? tg.initData : '' })
    });
    const data = await res.json();
    if (data.allowed) {
      document.getElementById('denied-screen').classList.remove('visible');
      showMain();
    } else {
      msg.textContent = 'Подписка не найдена. Попробуйте ещё раз.';
      btn.disabled = false;
      btn.textContent = '✓ Я подписался — проверить';
    }
  } catch {
    msg.textContent = 'Ошибка соединения. Попробуйте ещё раз.';
    btn.disabled = false;
    btn.textContent = '✓ Я подписался — проверить';
  }
}

function showMain() {
  document.getElementById('loading-screen').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-screen').classList.add('visible');
  }, 600);
}

function showDenied() {
  document.getElementById('loading-screen').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('denied-screen').classList.add('visible');
  }, 600);
}

// ── СТАРТ ────────────────────────────────────────────────────
renderStations();
checkSubscription();
</script>
</body>
</html>
