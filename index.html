<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Радио</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:       #c8dff0;
  --sky2:      #a8c8e0;
  --sky3:      #7aaac8;
  --green:     #4a8e28;
  --green2:    #3a7020;
  --green3:    #d4ead8;
  --orange:    #e07820;
  --orange2:   #f09030;
  --orange3:   #fff0d8;
  --white:     #ffffff;
  --text:      #2c3e50;
}

body {
  margin: 0; padding: 0;
  font-family: 'Nunito', sans-serif;
  background: var(--green3);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* Экраны входа и проверки */
#auth-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--green3); display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.auth-card {
  background: white; padding: 30px; border-radius: 25px; text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 85%; max-width: 320px;
}
.auth-btn {
  background: var(--green); color: white; border: none; padding: 14px;
  border-radius: 15px; font-weight: 700; margin-top: 15px; cursor: pointer; width: 100%;
}
.auth-btn.secondary { background: var(--sky3); }

/* Основной контент */
#main-app { display: none; opacity: 0; transition: opacity 0.5s ease; height: 100vh; }
#main-app.visible { display: flex; flex-direction: column; opacity: 1; }

.header {
  padding: 15px; text-align: center; background: white;
  border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
.header h1 {
  margin: 0; font-family: 'Cormorant Garamond', serif;
  font-size: 24px; color: var(--green);
}

.player-card {
  margin: 15px; padding: 20px; background: white; border-radius: 25px;
  text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}
.station-logo {
  width: 80px; height: 80px; background: var(--green3);
  border-radius: 50%; margin: 0 auto 10px; display: flex;
  align-items: center; justify-content: center; font-size: 35px;
}
.track-title { font-weight: 700; font-size: 16px; margin-bottom: 5px; height: 20px; overflow: hidden; }
.station-name { color: var(--sky3); font-size: 13px; margin-bottom: 15px; }

.controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
.play-btn {
  width: 60px; height: 60px; border-radius: 50%; background: var(--green);
  color: white; border: none; font-size: 25px; cursor: pointer;
  box-shadow: 0 5px 15px rgba(74, 142, 40, 0.3);
}

.station-list {
  flex: 1; overflow-y: auto; padding: 0 15px 15px;
}
.station-item {
  display: flex; align-items: center; padding: 10px; background: rgba(255,255,255,0.7);
  border-radius: 15px; margin-bottom: 8px; cursor: pointer; border: 1.5px solid transparent;
  transition: 0.2s;
}
.station-item.active { background: white; border-color: var(--green); transform: scale(1.02); }
.item-icon { width: 35px; height: 35px; border-radius: 10px; background: var(--green3); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.item-info div:first-child { font-weight: 600; font-size: 14px; }
.item-info div:last-child { font-size: 11px; color: #777; }
</style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-card">
      <div id="auth-icon" style="font-size: 50px;">🌱</div>
      <h3 id="auth-title">Проверка доступа</h3>
      <p id="auth-text">Настраиваем эфир...</p>
      <div id="auth-actions"></div>
    </div>
  </div>

  <div id="main-app">
    <div class="header"><h1>Наше Радио</h1></div>
    
    <div class="player-card">
      <div class="station-logo" id="current-logo">📻</div>
      <div class="track-title" id="track-title">Выберите волну</div>
      <div class="station-name" id="station-name">Готовы к эфиру</div>
      <div class="controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      </div>
    </div>

    <div class="station-list" id="station-list"></div>
  </div>

<script>
const tg = window.Telegram.WebApp;
const BACKEND_URL = 'https://myradio-rrsk.onrender.com';

// ТВОИ 5 СТАНЦИЙ
const stations = [
  { id: 1, name: 'DWG Radio', url: 'http://stream.dwgradio.net:8000/dwgradio_64', icon: '🙏', desc: 'Христианские песни' },
  { id: 2, name: 'Голос Мира (Осн)', url: 'http://golosmira.com:8021/rgm.mp3', icon: '🕊️', desc: 'Радио Голос Мира' },
  { id: 3, name: 'Голос Мира (Доп)', url: 'http://golosmira.com:8021/rgm2.mp3', icon: '✨', desc: 'Дополнительный канал' },
  { id: 4, name: 'Голос Мира (Арх)', url: 'http://golosmira.com:8021/rgm3.mp3', icon: '📚', desc: 'Архивные записи' },
  { id: 5, name: 'Слово Благодати', url: 'http://radio.slovo.org:8000/64k', icon: '📖', desc: 'Духовное слово' }
];

let currentStation = null;
let isPlaying = false;
let audio = new Audio();
let metaInterval = null;

async function checkAccess() {
    const actions = document.getElementById('auth-actions');
    if (!tg.initData) {
        document.getElementById('auth-title').innerText = 'Открыть в Telegram';
        actions.innerHTML = `<button class="auth-btn" onclick="window.location.href='https://t.me/preoradio_bot'">Открыть бот</button>`;
        return;
    }

    try {
        const res = await fetch(`${BACKEND_URL}/verify`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ init_data: tg.initData })
        });
        const data = await res.json();

        if (data.allowed) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').classList.add('visible');
            renderStations();
            tg.expand();
        } else {
            document.getElementById('auth-icon').innerText = '🔒';
            document.getElementById('auth-title').innerText = 'Только для канала';
            document.getElementById('auth-text').innerText = 'Пожалуйста, подпишитесь на наш канал для доступа.';
            actions.innerHTML = `
                <button class="auth-btn" onclick="tg.openTelegramLink('${data.invite_link}')">Подписаться</button>
                <button class="auth-btn secondary" onclick="checkAccess()">Я подписался!</button>
            `;
        }
    } catch (e) {
        document.getElementById('auth-title').innerText = 'Ошибка связи';
        actions.innerHTML = `<button class="auth-btn" onclick="checkAccess()">Повторить</button>`;
    }
}

function renderStations() {
  const list = document.getElementById('station-list');
  stations.forEach(s => {
    const div = document.createElement('div');
    div.className = 'station-item';
    div.id = `station-${s.id}`;
    div.innerHTML = `<div class="item-icon">${s.icon}</div><div class="item-info"><div>${s.name}</div><div>${s.desc}</div></div>`;
    div.onclick = () => selectStation(s);
    list.appendChild(div);
  });
}

function selectStation(s) {
  if (currentStation?.id === s.id) return togglePlay();
  
  document.querySelectorAll('.station-item').forEach(i => i.classList.remove('active'));
  document.getElementById(`station-${s.id}`).classList.add('active');

  currentStation = s;
  audio.src = s.url;
  document.getElementById('station-name').innerText = s.name;
  document.getElementById('current-logo').innerText = s.icon;
  document.getElementById('track-title').innerText = 'Загрузка...';
  
  play();
  updateMetadata();
}

function togglePlay() {
  if (!currentStation) return selectStation(stations[0]);
  isPlaying ? pause() : play();
}

function play() {
  audio.play().catch(e => console.log("Play blocked"));
  isPlaying = true;
  document.getElementById('play-btn').innerText = '⏸';
}

function pause() {
  audio.pause();
  isPlaying = false;
  document.getElementById('play-btn').innerText = '▶';
}

async function updateMetadata() {
  if (!currentStation || !isPlaying) return;
  try {
    const res = await fetch(`${BACKEND_URL}/metadata?url=${encodeURIComponent(currentStation.url)}`);
    const data = await res.json();
    if (data.title) document.getElementById('track-title').innerText = data.title;
  } catch (e) {}
  
  if (metaInterval) clearTimeout(metaInterval);
  metaInterval = setTimeout(updateMetadata, 20000);
}

window.onload = checkAccess;
</script>
</body>
</html>
